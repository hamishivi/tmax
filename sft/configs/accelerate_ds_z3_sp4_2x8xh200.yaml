# DeepSpeed ZeRO-3 + Ulysses Sequence Parallelism (SP=4) on 2 nodes × 8 H200 GPUs
#
# SP=4 within each node (2 SP groups per node, on NVLink).
# DP_shard=4 across both nodes (ZeRO-3).
# Keeps the heavy all-to-all SP traffic on NVLink; gradient/param
# sharding spans both nodes.
#
# Effective parallelism: SP=4, DP=4
# Constraint: dp_shard_size * sp_size = num_processes (4 * 4 = 16)

compute_environment: LOCAL_MACHINE

num_machines: 2
machine_rank: 0
num_processes: 16

main_process_ip: null
main_process_port: 29500

distributed_type: DEEPSPEED

mixed_precision: bf16
downcast_bf16: "no"

deepspeed_config:
  zero_stage: 3
  zero3_init_flag: true
  zero3_save_16bit_model: true
  offload_optimizer_device: none
  offload_param_device: none
  seq_parallel_communication_data_type: bf16
  stage3_prefetch_bucket_size: 5.0e8
  stage3_param_persistence_threshold: 1.0e6
  overlap_comm: true

parallelism_config:
  parallelism_config_dp_replicate_size: 1
  parallelism_config_dp_shard_size: 4
  parallelism_config_tp_size: 1
  parallelism_config_sp_size: 4
  parallelism_config_sp_backend: deepspeed
  parallelism_config_sp_seq_length_is_variable: true
  parallelism_config_sp_attn_implementation: flash_attention_2

rdzv_backend: static
same_network: true
main_training_function: main
