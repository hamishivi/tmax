# DeepSpeed ZeRO-3 + Ulysses Sequence Parallelism (SP=8) on 8 H200 GPUs
#
# Pure SP: all 8 GPUs form one SP group, dp_shard_size=1.
# Best for maximum sequence length on a single node.
#
# Effective parallelism: SP=8, DP=1
# If you want 2D parallelism (e.g. SP=4, DP=2), use accelerate_ds_z3_sp4_8xh200.yaml

compute_environment: LOCAL_MACHINE

num_machines: 1
machine_rank: 0
num_processes: 8

distributed_type: DEEPSPEED

mixed_precision: bf16
downcast_bf16: "no"

deepspeed_config:
  zero_stage: 3
  zero3_init_flag: true
  zero3_save_16bit_model: true
  offload_optimizer_device: none
  offload_param_device: none
  seq_parallel_communication_data_type: bf16

parallelism_config:
  parallelism_config_dp_replicate_size: 1
  parallelism_config_dp_shard_size: 1
  parallelism_config_tp_size: 1
  parallelism_config_sp_size: 8
  parallelism_config_sp_backend: deepspeed
  parallelism_config_sp_seq_length_is_variable: true
  parallelism_config_sp_attn_implementation: flash_attention_2

rdzv_backend: static
same_network: true
main_training_function: main
